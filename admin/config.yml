backend:
  name: git-gateway
  branch: main

media_folder: "assets/img"
public_folder: "assets/img"

collections:
  - name: "portfolio"
    label: "Portfolio"
    files:
      - name: "portfolio"
        label: "Portfolio Pieces"
        file: "data/portfolio.json"
        fields:
          - label: "Items"
            name: "items"
            widget: "list"
            summary: "{{title}}"
            fields:
              - { label: "ID (unique, lowercase, no spaces)", name: "id", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - label: "Collection"
                name: "category"
                widget: "relation"
                collection: "collections"
                file: "collections"
                search_fields: ["collections.*.label"]
                value_field: "collections.*.slug"
                display_fields: ["collections.*.label"]
                hint: "Pick from the collections defined in the 'Collections' tab. Add a new collection there first if you don't see the one you want."
              - { label: "Materials", name: "materials", widget: "string" }
              - { label: "Dimensions", name: "dimensions", widget: "string" }
              - { label: "Description", name: "description", widget: "text" }
              - label: "Tags (Sold / Available / Published, etc.)"
                name: "tags"
                widget: "list"
                field: { label: "Tag", name: "tag", widget: "string" }
              - { label: "Two-image diptych?", name: "diptych", widget: "boolean", default: false, required: false }
              - { label: "Image (leave blank if diptych)", name: "image", widget: "image", required: false, choose_url: false }
              - { label: "Image Alt Text", name: "alt", widget: "string", required: false }
              - label: "Image Rotation (fixes a sideways or upside-down photo)"
                name: "rotation"
                widget: "select"
                options:
                  - { label: "None", value: 0 }
                  - { label: "90° clockwise", value: 90 }
                  - { label: "180°", value: 180 }
                  - { label: "270° clockwise (= 90° counter-clockwise)", value: 270 }
                default: 0
                required: false
                hint: "How this photo appears in the portfolio grid, the home page, and when first opened in the viewer. Visitors can still rotate further from here using the viewer's rotate buttons."
              - label: "Diptych Images (only if diptych is checked)"
                name: "images"
                widget: "list"
                required: false
                fields:
                  - { label: "Image", name: "src", widget: "image", choose_url: false }
                  - { label: "Alt Text", name: "alt", widget: "string" }
                  - { label: "Note (this panel's description)", name: "note", widget: "string", required: false }
                  - label: "Image Rotation (fixes a sideways or upside-down photo)"
                    name: "rotation"
                    widget: "select"
                    options:
                      - { label: "None", value: 0 }
                      - { label: "90° clockwise", value: 90 }
                      - { label: "180°", value: 180 }
                      - { label: "270° clockwise (= 90° counter-clockwise)", value: 270 }
                    default: 0
                    required: false

  - name: "collections"
    label: "Collections"
    files:
      - name: "collections"
        label: "Portfolio Collections"
        file: "data/collections.json"
        fields:
          - label: "Collections"
            name: "collections"
            widget: "list"
            summary: "{{label}}"
            hint: "These show up as filter buttons on the Portfolio page (in this order), and as choices for each piece's 'Collection' field. Add a new one any time — just give it a short slug (lowercase, no spaces) and a display label."
            fields:
              - { label: "Slug (lowercase, no spaces, e.g. 'sculpture')", name: "slug", widget: "string" }
              - { label: "Display Label (e.g. 'Sculpture')", name: "label", widget: "string" }

  - name: "about"
    label: "About Page"
    files:
      - name: "about"
        label: "About Content"
        file: "data/about.json"
        fields:
          - { label: "Portrait Image", name: "portrait", widget: "image", choose_url: false }
          - label: "Bio Paragraphs"
            name: "bioParagraphs"
            widget: "list"
            field: { label: "Paragraph", name: "paragraph", widget: "text" }
          - { label: "Quote", name: "quote", widget: "text" }
          - { label: "Quote Author", name: "quoteAuthor", widget: "string" }
          - label: "Stats Row"
            name: "stats"
            widget: "list"
            hint: "The 'Original Works' entry's number is calculated automatically from the Portfolio count — whatever Value you enter for it here is ignored on the live site."
            fields:
              - { label: "Value", name: "value", widget: "string", hint: "Ignored for the 'Original Works' row — auto-calculated instead." }
              - { label: "Label", name: "label", widget: "string" }
          - { label: "Timeline Section Intro", name: "timelineIntro", widget: "text" }
          - label: "Timeline"
            name: "timeline"
            widget: "list"
            summary: "{{year}} — {{title}}"
            fields:
              - { label: "Year / Date", name: "year", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }
          - { label: "Exhibit Section Heading", name: "exhibitHeading", widget: "string" }
          - { label: "Exhibit Section Note", name: "exhibitNote", widget: "string" }
          - label: "Exhibit Gallery"
            name: "exhibitGallery"
            widget: "list"
            summary: "{{title}}"
            fields:
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Meta", name: "meta", widget: "string" }
              - { label: "Image", name: "image", widget: "image", choose_url: false }
              - { label: "Alt Text", name: "alt", widget: "string" }
          - label: "Process Steps"
            name: "processSteps"
            widget: "list"
            summary: "{{num}} — {{title}}"
            fields:
              - { label: "Number", name: "num", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Text", name: "text", widget: "text" }

  - name: "home"
    label: "Home Page"
    files:
      - name: "home"
        label: "Home Content"
        file: "data/home.json"
        fields:
          - { label: "Hero Heading — Emphasis Word (colored, starts line 1)", name: "heroHeadingEmphasis", widget: "string" }
          - { label: "Hero Heading — Rest of Line 1", name: "heroHeadingLine1Rest", widget: "string" }
          - { label: "Hero Heading — Line 2", name: "heroHeadingLine2", widget: "string" }
          - { label: "Hero Subtext", name: "heroSub", widget: "text" }
          - label: "Hero Meta Rows (Discipline / Based / Commissions)"
            name: "heroMeta"
            widget: "list"
            fields:
              - { label: "Label", name: "label", widget: "string" }
              - { label: "Value", name: "value", widget: "string" }
          - { label: "Artist Statement Heading — Line 1", name: "statementHeadingLine1", widget: "string" }
          - { label: "Artist Statement Heading — Line 2", name: "statementHeadingLine2", widget: "string" }
          - { label: "Artist Statement Quote", name: "statementQuote", widget: "text" }
          - label: "Number of Recent Pieces to Show"
            name: "featuredCount"
            widget: "number"
            valueType: "int"
            min: 1
            max: 6
            default: 3
            hint: "The 'Recent Pieces' section on Home always shows the newest additions to the Portfolio automatically — this just controls how many. To feature a specific piece, add it to the Portfolio (it'll show up here once it's among the most recent)."

  - name: "contact"
    label: "Contact Page"
    files:
      - name: "contact"
        label: "Contact Content"
        file: "data/contact.json"
        fields:
          - { label: "Page Intro", name: "pageIntro", widget: "text" }
          - { label: "Email", name: "email", widget: "string" }
          - { label: "Based — Line 1", name: "basedLine1", widget: "string" }
          - { label: "Based — Line 2", name: "basedLine2", widget: "string" }
          - { label: "Commissions Text", name: "commissions", widget: "text" }
          - { label: "Response Time", name: "responseTime", widget: "text" }
          - { label: "Instagram Handle (no @)", name: "instagramHandle", widget: "string" }
          - { label: "Instagram URL", name: "instagramUrl", widget: "string" }

  - name: "site"
    label: "Site-Wide (Footer & Nav)"
    files:
      - name: "site"
        label: "Site Settings"
        file: "data/site.json"
        fields:
          - { label: "Nav Panel Tagline", name: "navTagline", widget: "text" }
          - { label: "Footer Tagline", name: "footerTagline", widget: "text" }
          - { label: "Footer Copyright", name: "footerCopyright", widget: "string" }
          - { label: "Footer 'Built With' Line", name: "footerBuiltWith", widget: "string" }
          - { label: "Instagram Handle (no @)", name: "instagramHandle", widget: "string" }
          - { label: "Instagram URL", name: "instagramUrl", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }
